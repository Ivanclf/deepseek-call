<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepseek Chat</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-block">
        <div class="brand-icon">D</div>
        <div class="brand-text">
          <h1>Deepseek</h1>
          <p>思考式 AI 助手</p>
        </div>
      </div>
      <button class="button primary" id="new-conversation">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14"/>
          <path d="M5 12h14"/>
        </svg>
        新建会话
      </button>
      <div class="conversation-list" id="conversation-list"></div>
      <button class="theme-toggle" id="theme-toggle" title="切换主题">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <div class="left">
          <div class="avatar-large">D</div>
          <div class="info">
            <h2 id="conversation-title">Deepseek</h2>
            <p id="chat-subtitle">启动一个新会话，Deepseek 会话将以流式方式返回。</p>
          </div>
        </div>
        <div class="actions">
          <div id="request-status" class="status-chip">
            <span class="dot"></span>
            <span>准备就绪</span>
          </div>
        </div>
      </header>

      <div class="conversation-window" id="conversation-window">
        <div class="empty-state" id="empty-state">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
          </div>
          <h3>欢迎使用 Deepseek</h3>
          <p>创建新会话开始与 AI 助手对话</p>
        </div>
      </div>

      <div class="input-panel">
        <div class="input-info" id="input-info">
          <span class="edit-hint">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
            </svg>
            修改上一条消息
          </span>
          <button class="modify-btn" id="modify-btn">修改</button>
        </div>
        <div class="textarea-wrapper">
          <textarea id="message-input" placeholder="向 Deepseek 询问问题..." rows="3"></textarea>
          <div class="input-actions">
            <button class="button secondary" id="cancel-edit" style="display: none;">取消</button>
            <button class="button secondary" id="clear-input">清空</button>
            <button class="button primary" id="send-button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 2L11 13"/>
                <path d="M22 2l-7 20-4-9-9-4 11-11"/>
              </svg>
              发送
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="animation.js"></script>
  <script src="app.js"></script>
</body>
</html>
